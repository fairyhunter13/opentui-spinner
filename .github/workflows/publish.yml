name: Publish to npm

on:
  push:
    branches: [enhancement/opencode-fork-compat]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.0.7). Leave empty for auto-increment."
        required: false
        type: string
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            CURRENT=$(npm view @fairyhunter13/opentui-spinner version 2>/dev/null || echo "0.0.0")
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          fi
          echo "Publishing version: $(cat "$GITHUB_OUTPUT" | grep version | cut -d= -f2)"

      - name: Guard against version regression
        run: |
          LATEST=$(npm view @fairyhunter13/opentui-spinner version 2>/dev/null || echo "0.0.0")
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$(printf '%s\n' "$LATEST" "$VERSION" | sort -V | tail -1)" != "$VERSION" ]]; then
            echo "ERROR: Version $VERSION <= latest $LATEST"
            exit 1
          fi

      - name: Build
        run: bun run build

      - name: Prepare package for publish
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Rewrite package.json for publish
          bun -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            pkg.name = '@fairyhunter13/opentui-spinner';
            pkg.version = '${VERSION}';
            pkg.repository = {
              type: 'git',
              url: 'https://github.com/fairyhunter13/opentui-spinner.git'
            };
            // Repoint peerDependencies
            if (pkg.peerDependencies) {
              const newPeers = {};
              for (const [k, v] of Object.entries(pkg.peerDependencies)) {
                if (k === '@opentui/core') {
                  newPeers['@fairyhunter13/opentui-core'] = v;
                } else if (k === '@opentui/solid') {
                  newPeers['@fairyhunter13/opentui-solid'] = v;
                } else if (k === '@opentui/react') {
                  // skip react - not used in opencode fork
                } else {
                  newPeers[k] = v;
                }
              }
              pkg.peerDependencies = newPeers;
            }
            // Also update peerDependenciesMeta
            if (pkg.peerDependenciesMeta) {
              const newMeta = {};
              for (const [k, v] of Object.entries(pkg.peerDependenciesMeta)) {
                if (k === '@opentui/react') {
                  // skip react meta
                } else if (k === '@opentui/solid') {
                  newMeta['@fairyhunter13/opentui-solid'] = v;
                } else {
                  newMeta[k] = v;
                }
              }
              pkg.peerDependenciesMeta = newMeta;
            }
            pkg.publishConfig = { access: 'public' };
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Package prepared:"
          cat package.json

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish
        if: ${{ !inputs.dry_run }}
        run: npm publish --access public

      - name: Publish (dry run)
        if: ${{ inputs.dry_run }}
        run: npm publish --access public --dry-run
